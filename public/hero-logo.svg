<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img" aria-label="美股DCA 折價追蹤">
  <defs>
    <linearGradient id="goldFace" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffbe0"/>
      <stop offset="14%" stop-color="#fff0a6"/>
      <stop offset="34%" stop-color="#ffd452"/>
      <stop offset="55%" stop-color="#c88112"/>
      <stop offset="68%" stop-color="#6b3d05"/>
      <stop offset="82%" stop-color="#ffe680"/>
      <stop offset="100%" stop-color="#b87512"/>
    </linearGradient>
    <linearGradient id="goldSide" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7a4305"/>
      <stop offset="45%" stop-color="#d18b18"/>
      <stop offset="100%" stop-color="#3d2203"/>
    </linearGradient>
    <filter id="metalShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="0" flood-color="#8a5208" flood-opacity="1"/>
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#5a3204" flood-opacity=".9"/>
      <feDropShadow dx="5" dy="12" stdDeviation="0" flood-color="#3a2408" flood-opacity=".72"/>
      <feDropShadow dx="0" dy="18" stdDeviation="10" flood-color="#000000" flood-opacity=".68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffe680" flood-opacity=".18"/>
    </filter>
    <filter id="shine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 .86  0 0 1 0 .42  0 0 0 .35 0"/>
    </filter>
    <style>
      .title {
        font-family: 'Noto Serif TC','Microsoft JhengHei','PingFang TC','Heiti TC',serif;
        font-weight: 1000;
        letter-spacing: -14px;
      }
      .line1 { font-size: 142px; }
      .line2 { font-size: 150px; }
      .subtitle {
        font-family: 'Microsoft JhengHei','PingFang TC',sans-serif;
        font-size: 38px;
        font-weight: 900;
        letter-spacing: 1px;
      }
    </style>
  </defs>
  <rect width="900" height="430" fill="transparent"/>
  <g filter="url(#metalShadow)">
    <text class="title line1" x="450" y="145" text-anchor="middle" fill="url(#goldSide)" transform="translate(7,11)">美股DCA</text>
    <text class="title line2" x="450" y="288" text-anchor="middle" fill="url(#goldSide)" transform="translate(7,11)">折價追蹤</text>
    <text class="title line1" x="450" y="145" text-anchor="middle" fill="url(#goldFace)" stroke="#fff5ba" stroke-width="2.2">美股DCA</text>
    <text class="title line2" x="450" y="288" text-anchor="middle" fill="url(#goldFace)" stroke="#fff5ba" stroke-width="2.2">折價追蹤</text>
    <path d="M155 55 H690" stroke="#fff7bd" stroke-width="6" opacity=".28" filter="url(#shine)"/>
  </g>
  <text class="subtitle" x="450" y="370" text-anchor="middle" fill="#c8ced9" opacity=".78" filter="url(#shine)">Binance xStocks 財富儀表板</text>
</svg>
