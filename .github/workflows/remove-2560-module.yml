name: Remove 2560 Module

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/remove-2560-module.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remove-2560-module
  cancel-in-progress: false

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove 2560 application, backend, automation and research files
        shell: bash
        run: |
          set -euo pipefail

          rm -f pages/2560-paper.js
          rm -f pages/api/2560-paper.js
          rm -rf pages/api/2560
          rm -f lib/2560-store.js
          rm -f config/2560-universe.json

          find scripts -maxdepth 1 -type f -iname '*2560*' -delete 2>/dev/null || true
          find .github/workflows -maxdepth 1 -type f -iname '2560-*' -delete 2>/dev/null || true

          rm -rf data/2560-binance-history
          find data -maxdepth 2 -iname '*2560*' -exec rm -rf {} + 2>/dev/null || true

          find reports -type f -iname '*2560*' -delete 2>/dev/null || true
          find reports -type d -empty -delete 2>/dev/null || true

          rm -f .github/workflows/remove-2560-module.yml

          echo 'Remaining tracked paths containing 2560 in their name:'
          git ls-files | grep -i '2560' || true

      - name: Commit removal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No 2560 files remained.'
          else
            git commit -m 'Remove retired 2560 strategy module [skip ci]'
            git push origin HEAD:main
          fi
