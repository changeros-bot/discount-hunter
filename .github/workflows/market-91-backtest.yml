name: Market 91 Discount Hunter Backtest

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/backtest_market_91_discount_hunter.py"
      - ".github/workflows/market-91-backtest.yml"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance
      - name: Run 91-name Discount Hunter backtest
        run: |
          python scripts/backtest_market_91_discount_hunter.py
      - name: Commit market 91 reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/backtests/market_91 || true
          if git diff --cached --quiet; then echo "No market 91 report changes to commit."; else git commit -m "Update market 91 Discount Hunter reports" && git push; fi
