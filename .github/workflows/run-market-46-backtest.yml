name: Build Watchlist 36 Final

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/deep_review_watchlist_36.py'
      - 'scripts/build_watchlist_36_group_decisions.py'
      - 'scripts/export_watchlist_36_final.py'
      - '.github/workflows/run-market-46-backtest.yml'

concurrency:
  group: watchlist-36-final-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-final:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas yfinance
      - name: Verify committed inputs
        run: |
          test -f reports/backtests/market_46/watchlist_36_stage_classification.csv
          test -f reports/backtests/market_46/watchlist_36_full_taxonomy.csv
      - name: Review 36 fundamentals
        run: python scripts/deep_review_watchlist_36.py
      - name: Build 36 decisions
        run: python scripts/build_watchlist_36_group_decisions.py
      - name: Export final table
        run: python scripts/export_watchlist_36_final.py
      - name: Validate final table
        run: |
          python - <<'PY'
          import pandas as pd
          path='reports/backtests/market_46/watchlist_36_final.csv'
          final=pd.read_csv(path)
          expected=['ticker','strategy','fundamental_status','quality_score','backtest_score','valuation_band','decision','reason']
          assert len(final)==36
          assert final['ticker'].nunique()==36
          assert list(final.columns)==expected
          print(final['decision'].value_counts(dropna=False).to_string())
          PY
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-36-final
          path: reports/backtests/market_46/watchlist_36_final.csv
          retention-days: 30
      - name: Commit result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/backtests/market_46/watchlist_36_final.csv
          if git diff --cached --quiet; then
            echo 'No final-table changes to commit'
          else
            git commit -m 'Update watchlist 36 final table [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
