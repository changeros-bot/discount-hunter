name: Run Market 46 Backtest

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/backtest_market_46_complete.py'
      - 'scripts/backtest_market_91_discount_hunter.py'
      - '.github/workflows/run-market-46-backtest.yml'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance numpy

      - name: Run unified 46-name backtest
        run: python scripts/backtest_market_46_complete.py

      - name: Validate outputs
        run: |
          test -f reports/backtests/market_46/market_46_master_ranking.csv
          test -f reports/backtests/market_46/market_46_status.csv
          python - <<'PY'
          import pandas as pd
          p='reports/backtests/market_46/market_46_status.csv'
          df=pd.read_csv(p)
          assert len(df)==46, f'expected 46 symbols, got {len(df)}'
          assert df['ticker'].nunique()==46, 'duplicate symbols found'
          print(df['status'].value_counts(dropna=False).to_string())
          PY

      - name: Upload backtest artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-46-backtest
          path: reports/backtests/market_46/
          retention-days: 30

      - name: Commit generated reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/backtests/market_46/
          if git diff --cached --quiet; then
            echo 'No report changes to commit'
          else
            git commit -m 'Update unified 46-name backtest results [skip ci]'
            git push
          fi
