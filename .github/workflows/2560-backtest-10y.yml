name: 2560 Ten-Year Backtest

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/backtest_2560_10y.py
      - scripts/analyze_2560_backtest.py
      - scripts/analyze_2560_backtest_fast.py
      - scripts/paper_2560_bot.py
      - config/2560-universe.json
      - .github/workflows/2560-backtest-10y.yml

permissions:
  contents: write

concurrency:
  group: 2560-backtest-10y
  cancel-in-progress: true

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy yfinance

      - name: Run current-universe ten-year backtest
        run: python scripts/backtest_2560_10y.py

      - name: Run optimized statistical validation and BUILT_VOLUME grid
        run: python scripts/analyze_2560_backtest_fast.py

      - name: Commit reproducible results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tmp_dir="$(mktemp -d)"
          cp -R reports/backtest "$tmp_dir/backtest"
          git fetch origin main
          git reset --hard origin/main
          rm -rf reports/backtest
          mkdir -p reports
          cp -R "$tmp_dir/backtest" reports/backtest
          git add reports/backtest
          if git diff --cached --quiet; then
            echo "No backtest changes."
          else
            git commit -m "Update 2560 ten-year statistical analysis [skip ci]"
            git push origin HEAD:main
          fi
