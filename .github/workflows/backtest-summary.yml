name: Backtest Summary

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which backtest to run"
        required: true
        default: "discount"
        type: choice
        options:
          - discount
          - discount_2560
          - 2560_sector
          - 2560_sim
          - all
      source:
        description: "Price source"
        required: true
        default: "yfinance"
        type: choice
        options:
          - yfinance
          - csv

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run Discount Hunter simulation if events exist
        if: ${{ github.event.inputs.target == 'discount' || github.event.inputs.target == 'all' }}
        run: |
          if [ -f reports/backtests/discount_hunter_events.csv ]; then
            python scripts/simulate_discount_hunter.py
          else
            echo "reports/backtests/discount_hunter_events.csv not found. Run discount backtest first or commit event CSV."
          fi

      - name: Run Discount Hunter 2560 filter backtest
        if: ${{ github.event.inputs.target == 'discount_2560' || github.event.inputs.target == 'all' }}
        run: |
          python scripts/backtest_discount_hunter_2560.py --source ${{ github.event.inputs.source }}

      - name: Run 2560 sector lab backtest
        if: ${{ github.event.inputs.target == '2560_sector' || github.event.inputs.target == 'all' }}
        run: |
          python scripts/backtest_2560_sector_lab.py --source ${{ github.event.inputs.source }}

      - name: Run 2560 lab simulation
        if: ${{ github.event.inputs.target == '2560_sim' || github.event.inputs.target == 'all' }}
        run: |
          if [ -f reports/backtests/2560_sector_events.csv ]; then
            python scripts/simulate_2560_lab.py --source ${{ github.event.inputs.source }}
          else
            echo "reports/backtests/2560_sector_events.csv not found. Run target 2560_sector first."
          fi

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/backtests || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update backtest reports"
            git push
          fi
