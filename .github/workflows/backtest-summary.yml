name: Backtest Summary

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which backtest to run"
        required: true
        default: "leveraged"
        type: choice
        options:
          - leveraged
          - discount
          - all
      source:
        description: "Price source"
        required: true
        default: "yfinance"
        type: choice
        options:
          - yfinance
          - csv

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run Leveraged Hunter backtest and simulation
        if: ${{ github.event.inputs.target == 'leveraged' || github.event.inputs.target == 'all' }}
        run: |
          python scripts/backtest_leveraged_hunter.py --batch A B --source ${{ github.event.inputs.source }}
          python scripts/simulate_leveraged_hunter.py

      - name: Run Discount Hunter simulation if events exist
        if: ${{ github.event.inputs.target == 'discount' || github.event.inputs.target == 'all' }}
        run: |
          if [ -f reports/backtests/discount_hunter_events.csv ]; then
            python scripts/simulate_discount_hunter.py
          else
            echo "reports/backtests/discount_hunter_events.csv not found. Run discount backtest first or commit event CSV."
          fi

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/backtests || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update backtest simulation reports"
            git push
          fi
