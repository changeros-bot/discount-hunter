name: Backtest Summary

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which backtest to run"
        required: true
        default: "discount"
        type: choice
        options:
          - discount
          - discount_2560
          - watch_2560
          - 2560_sector
          - 2560_sim
          - all
      source:
        description: "Price source"
        required: true
        default: "yfinance"
        type: choice
        options:
          - yfinance
          - csv

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance
      - name: Run selected backtest
        env:
          TARGET: ${{ github.event.inputs.target }}
          SOURCE: ${{ github.event.inputs.source }}
        run: |
          if [ "$TARGET" = "discount" ] || [ "$TARGET" = "all" ]; then
            python scripts/backtest_core_discount_hunter.py
            if [ -f reports/backtests/discount_hunter_events.csv ]; then python scripts/simulate_discount_hunter.py; fi
          fi
          if [ "$TARGET" = "discount_2560" ] || [ "$TARGET" = "all" ]; then
            python scripts/backtest_discount_hunter_2560.py --source "$SOURCE"
          fi
          if [ "$TARGET" = "watch_2560" ] || [ "$TARGET" = "all" ]; then
            python scripts/backtest_2560_watch_batch.py --source "$SOURCE"
          fi
          if [ "$TARGET" = "2560_sector" ] || [ "$TARGET" = "all" ]; then
            python scripts/backtest_2560_sector_lab.py --source "$SOURCE"
          fi
          if [ "$TARGET" = "2560_sim" ] || [ "$TARGET" = "all" ]; then
            if [ -f reports/backtests/2560_sector_events.csv ]; then python scripts/simulate_2560_lab.py --source "$SOURCE"; else echo "Run 2560_sector first."; fi
          fi
      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/backtests || true
          if git diff --cached --quiet; then echo "No report changes to commit."; else git commit -m "Update backtest reports" && git push; fi
