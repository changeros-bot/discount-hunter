name: Candidate Four Backtest

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/backtest_candidate_four.py"
      - ".github/workflows/candidate-four-backtest.yml"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance
      - name: Run BAI UFO CNDX ARM candidate backtests
        run: |
          python scripts/backtest_candidate_four.py
      - name: Commit candidate reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/backtests/candidate_four || true
          if git diff --cached --quiet; then echo "No candidate report changes to commit."; else git commit -m "Update candidate four backtest reports" && git push; fi
