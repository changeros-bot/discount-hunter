name: 2560 Paper Bot

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Price source"
        required: true
        default: "yfinance"
        type: choice
        options:
          - yfinance
          - csv
  schedule:
    # 22:30 UTC = 06:30 Taiwan time, after US market close and yfinance daily data has usually settled.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: 2560-paper-${{ github.ref }}
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run 2560 paper bot
        run: |
          python scripts/paper_2560_bot.py --source ${{ github.event.inputs.source || 'yfinance' }}

      - name: Commit paper reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/paper || true
          if git diff --cached --quiet; then
            echo "No paper report changes to commit."
          else
            git commit -m "Update 2560 paper reports"
            git pull --rebase origin main
            git push
          fi
