name: 2560 Paper Bot

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Price source"
        required: true
        default: "yfinance"
        type: choice
        options:
          - yfinance
          - csv
  schedule:
    # 22:30 UTC = 06:30 Taiwan time, after US market close and yfinance daily data has usually settled.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: 2560-paper-${{ github.ref }}
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    env:
      INGEST_TOKEN_2560: ${{ secrets.INGEST_TOKEN_2560 }}
      CANONICAL_BASE_URL_2560: ${{ vars.CANONICAL_BASE_URL_2560 || 'https://discount-hunter-sigma.vercel.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run unified 2560 paper universe and publish KV snapshot
        run: |
          python scripts/run_2560_universe.py --source ${{ github.event.inputs.source || 'yfinance' }}

      - name: Commit paper reports as audit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Preserve the freshly generated reports, move the worktree to the
          # latest main, then restore only the report files. This prevents
          # rebase conflicts when other commits land during the scan.
          tmp_dir="$(mktemp -d)"
          cp -R reports/paper "$tmp_dir/paper"
          git fetch origin main
          git reset --hard origin/main
          rm -rf reports/paper
          mkdir -p reports
          cp -R "$tmp_dir/paper" reports/paper

          git add reports/paper || true
          if git diff --cached --quiet; then
            echo "No paper report changes to commit."
          else
            git commit -m "Update 2560 paper reports"
            git push origin HEAD:main
          fi
