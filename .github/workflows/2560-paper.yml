name: 2560 Paper Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Calculation mode"
        required: true
        default: "hybrid"
        type: choice
        options:
          - hybrid
          - yfinance
          - csv
  schedule:
    # 22:30 UTC = 06:30 Taiwan time, after the US session.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: 2560-paper-${{ github.ref }}
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    env:
      INGEST_TOKEN_2560: ${{ secrets.INGEST_TOKEN_2560 }}
      CANONICAL_BASE_URL_2560: ${{ vars.CANONICAL_BASE_URL_2560 || 'https://discount-hunter-sigma.vercel.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Backfill Binance RWA OHLC and accumulate Binance volume
        run: |
          python scripts/collect_2560_binance_history.py

      - name: Archive pre-V1 active paper signals
        run: |
          python scripts/migrate_2560_legacy_trades.py

      - name: Run unified 2560 paper universe and publish KV snapshot
        shell: bash
        run: |
          mode="${{ github.event.inputs.mode || 'hybrid' }}"
          if [ "$mode" = "hybrid" ]; then
            python scripts/run_2560_universe.py --source csv --data-dir hybrid
          elif [ "$mode" = "csv" ]; then
            python scripts/run_2560_universe.py --source csv
          else
            python scripts/run_2560_universe.py --source yfinance
          fi

      - name: Commit paper reports and Binance history as audit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          tmp_dir="$(mktemp -d)"
          cp -R reports/paper "$tmp_dir/paper"
          if [ -d data/2560-binance-history ]; then
            cp -R data/2560-binance-history "$tmp_dir/2560-binance-history"
          fi

          git fetch origin main
          git reset --hard origin/main

          rm -rf reports/paper
          mkdir -p reports
          cp -R "$tmp_dir/paper" reports/paper

          if [ -d "$tmp_dir/2560-binance-history" ]; then
            rm -rf data/2560-binance-history
            mkdir -p data
            cp -R "$tmp_dir/2560-binance-history" data/2560-binance-history
          fi

          git add reports/paper data/2560-binance-history || true
          if git diff --cached --quiet; then
            echo "No generated 2560 changes to commit."
          else
            git commit -m "Update 2560 paper reports and Binance history"
            git push origin HEAD:main
          fi
