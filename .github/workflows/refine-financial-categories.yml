name: Refine financial categories and audit filters

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/refine-financial-categories.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch financial UI and API
        run: |
          python - <<'PY'
          from pathlib import Path

          # 1) Dashboard grouping: category=家用 must stay in 家用, not fall into 其他.
          p = Path('pages/financial-os.js')
          s = p.read_text()
          s = s.replace("  if (c === '居家修繕') return '居家修繕';\n  if (isHouse(t)) return '家用';", "  if (c === '居家修繕') return '居家修繕';\n  if (c === '家用' || isHouse(t)) return '家用';")
          p.write_text(s)

          # 2) API: separate exact amount from text search; text search no longer fuzzy-matches amount.
          p = Path('pages/api/financial/data.js')
          s = p.read_text()
          s = s.replace("      const q = clean(req.query.q, 200);\n      const limit", "      const q = clean(req.query.q, 200);\n      const amountExactRaw = clean(req.query.amountExact, 40);\n      const amountExact = amountExactRaw === '' ? null : Number(amountExactRaw);\n      const limit")
          s = s.replace("           and ($7 = '' or note ilike '%' || $7 || '%' or category ilike '%' || $7 || '%' or account ilike '%' || $7 || '%' or amount::text ilike '%' || $7 || '%')\n         order by tx_date desc, created_at desc\n         limit $8`,\n        [start, end, type, category, account, budgetId, q, limit]", "           and ($7 = '' or note ilike '%' || $7 || '%' or category ilike '%' || $7 || '%' or account ilike '%' || $7 || '%')\n           and ($8::numeric is null or amount = $8::numeric)\n         order by tx_date desc, created_at desc\n         limit $9`,\n        [start, end, type, category, account, budgetId, q, Number.isFinite(amountExact) ? amountExact : null, limit]")
          p.write_text(s)

          # 3) Audit page: stable complete categories, explicit exact amount, quick 其他 filter.
          p = Path('pages/financial-audit.js')
          s = p.read_text()
          s = s.replace("const nt = (n) => \"$\" + Number(n || 0).toLocaleString(\"zh-TW\", { maximumFractionDigits: 0 });", "const nt = (n) => \"$\" + Number(n || 0).toLocaleString(\"zh-TW\", { maximumFractionDigits: 0 });\nconst CATEGORY_OPTIONS = ['早餐','午餐','晚餐','飲料','咖啡','菸','點心/宵夜','生活用品','生活費','家用','居家修繕','交通','機車','醫療','醫療健康','教育','服飾','娛樂','金融','固定支出','富邦DCA','其他'];")
          s = s.replace("const [filters, setFilters] = useState({ start: monthStart(), end: today(), q: \"\", type: \"\", category: \"\", account: \"\", budgetId: \"\" });", "const [filters, setFilters] = useState({ start: monthStart(), end: today(), q: \"\", amountExact: \"\", type: \"\", category: \"\", account: \"\", budgetId: \"\" });")
          s = s.replace("  const categories = useMemo(() => [...new Set(data.transactions.map((t) => t.category).filter(Boolean))].sort(), [data.transactions]);", "  const categories = useMemo(() => [...new Set([...CATEGORY_OPTIONS, ...data.transactions.map((t) => t.category).filter(Boolean)])], [data.transactions]);")
          s = s.replace("        <input value={filters.q} onChange={(e) => setFilters({ ...filters, q: e.target.value })} placeholder=\"搜尋備註、分類或帳戶，例如：99、燈具、其他\" style={{ ...inputStyle, marginTop: 9 }} />", "        <input value={filters.q} onChange={(e) => setFilters({ ...filters, q: e.target.value })} placeholder=\"搜尋文字：打火機、淘寶運費、燈具、家用\" style={{ ...inputStyle, marginTop: 9 }} />\n        <input value={filters.amountExact} onChange={(e) => setFilters({ ...filters, amountExact: e.target.value })} placeholder=\"精確金額，例如：99（不會再誤抓 199、27950）\" inputMode=\"decimal\" style={{ ...inputStyle, marginTop: 9 }} />")
          s = s.replace("        <button disabled={loading} onClick={() => load(filters)} style={{ width: \"100%\", marginTop: 10, padding: 12, borderRadius: 14, border: \"1px solid rgba(212,175,55,.72)\", background: \"linear-gradient(180deg,rgba(250,204,21,.28),rgba(92,64,16,.74))\", color: \"#fff7bd\", fontWeight: 1000 }}>{loading ? \"查帳中…\" : \"執行查帳\"}</button>", "        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 9, marginTop: 10 }}>\n          <button disabled={loading} onClick={() => load(filters)} style={{ padding: 12, borderRadius: 14, border: \"1px solid rgba(212,175,55,.72)\", background: \"linear-gradient(180deg,rgba(250,204,21,.28),rgba(92,64,16,.74))\", color: \"#fff7bd\", fontWeight: 1000 }}>{loading ? \"查帳中…\" : \"執行查帳\"}</button>\n          <button disabled={loading} onClick={() => { const next = { ...filters, q: '', amountExact: '', type: '支出', category: '其他' }; setFilters(next); load(next); }} style={{ padding: 12, borderRadius: 14, border: '1px solid rgba(248,113,113,.45)', background: 'rgba(127,29,29,.22)', color: '#fecaca', fontWeight: 1000 }}>只看「其他」</button>\n        </div>")
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name changeros-bot
          git config user.email chang.eros@gmail.com
          git add pages/financial-os.js pages/api/financial/data.js pages/financial-audit.js
          git diff --cached --quiet || git commit -m "fix(financial): clarify categories and exact amount audit"
          git push
