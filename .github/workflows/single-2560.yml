name: Single 2560 Backtest

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker to test"
        required: true
        default: "SNDK"
      source:
        description: "Price source"
        required: true
        default: "yfinance"
        type: choice
        options:
          - yfinance
          - csv

permissions:
  contents: write

jobs:
  single:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run single ticker 2560 backtest
        run: |
          python scripts/backtest_2560_single.py --ticker ${{ github.event.inputs.ticker }} --source ${{ github.event.inputs.source }}

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/backtests || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update single 2560 backtest reports"
            git push
          fi
