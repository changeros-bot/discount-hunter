name: Polish financial category UI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/polish-financial-category-ui.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refine category accordion UI
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('pages/financial-os.js')
          s = p.read_text()

          s = s.replace(
            "  const outflowRows = [...s.ex, ...s.invRows];\n  return <>",
            "  const outflowRows = [...s.ex, ...s.invRows];\n  const groupIcon = { '飲食': '🍴', '家用': '⌂', '其他': '▦', '投資': '↗', '教育': '學', '交通': '車', '醫療': '＋', '娛樂': '樂', '金融': '$', '固定支出': '定', '生活用品': '品', '居家修繕': '修', '服飾': '衣' };\n  return <>"
          )

          old = '''    <Card><Title t="區間大類支出" r={`${s.outflowGroups.length} 類｜點擊看明細`} />{s.outflowGroups.map((g) => <button key={g.name} onClick={() => setSelectedGroup(selectedGroup?.name === g.name ? null : g)} style={{ width: '100%', display: 'grid', gridTemplateColumns: '82px 1fr auto', gap: 10, padding: '10px 0', border: 0, borderBottom: '1px solid rgba(148,163,184,.08)', background: selectedGroup?.name === g.name ? 'rgba(34,197,94,.08)' : 'transparent', color: '#f8fafc', textAlign: 'left', cursor: 'pointer' }}><b>{g.name}</b><div style={{ height: 12, borderRadius: 99, background: '#243044', overflow: 'hidden', marginTop: 4 }}><div style={{ height: '100%', width: Math.min(100, Math.max(1, g.amount / Math.max(1, s.totalOutflow) * 100)) + '%', background: 'linear-gradient(90deg,#38bdf8,#22c55e)' }} /></div><b>{nt(g.amount)}　›</b></button>)}{selectedGroup && <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(34,197,94,.24)' }}><div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, alignItems: 'center' }}><b style={{ color: '#86efac' }}>{selectedGroup.name}支出細項</b><button onClick={() => setSelectedGroup(null)} style={{ border: 0, background: 'transparent', color: '#94a3b8', fontWeight: 900 }}>收起</button></div><TxList rows={selectedGroup.rows || []} /></div>}</Card>'''

          new = '''    <Card style={{ padding: 14, borderColor: 'rgba(34,211,238,.32)', boxShadow: '0 20px 55px rgba(8,145,178,.12),0 14px 36px rgba(0,0,0,.32)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}><span style={{ width: 4, height: 28, borderRadius: 99, background: 'linear-gradient(180deg,#22d3ee,#10b981)', boxShadow: '0 0 18px rgba(34,211,238,.55)' }} /><h2 style={{ margin: 0, fontSize: 20, fontWeight: 1000 }}>區間大類支出</h2></div>
        <b style={{ color: '#5eead4', fontSize: 12 }}>{s.outflowGroups.length} 類｜點擊看明細</b>
      </div>
      <div style={{ display: 'grid', gap: 9 }}>
        {s.outflowGroups.map((g) => { const open = selectedGroup?.name === g.name; const pct = Math.min(100, Math.max(1, g.amount / Math.max(1, s.totalOutflow) * 100)); return <div key={g.name} style={{ border: open ? '1px solid rgba(45,212,191,.5)' : '1px solid rgba(56,189,248,.18)', borderRadius: 18, background: open ? 'linear-gradient(160deg,rgba(8,47,73,.88),rgba(6,78,59,.35))' : 'linear-gradient(160deg,rgba(15,23,42,.92),rgba(3,18,34,.88))', overflow: 'hidden', boxShadow: open ? '0 14px 35px rgba(16,185,129,.12)' : 'none' }}>
          <button onClick={() => setSelectedGroup(open ? null : g)} style={{ width: '100%', display: 'grid', gridTemplateColumns: '46px 64px minmax(70px,1fr) auto 18px', alignItems: 'center', gap: 10, padding: '14px 12px', border: 0, background: 'transparent', color: '#f8fafc', textAlign: 'left', cursor: 'pointer' }}>
            <span style={{ width: 42, height: 42, borderRadius: '50%', display: 'grid', placeItems: 'center', border: '1px solid rgba(34,211,238,.42)', color: '#2dd4bf', fontSize: 20, fontWeight: 1000, background: 'rgba(8,47,73,.48)', boxShadow: 'inset 0 0 18px rgba(34,211,238,.06)' }}>{groupIcon[g.name] || '•'}</span>
            <b style={{ fontSize: 16 }}>{g.name}</b>
            <span style={{ height: 10, borderRadius: 99, background: 'rgba(51,65,85,.78)', overflow: 'hidden', border: '1px solid rgba(148,163,184,.08)' }}><span style={{ display: 'block', height: '100%', width: pct + '%', borderRadius: 99, background: 'linear-gradient(90deg,#22d3ee,#14b8a6,#22c55e)', boxShadow: '0 0 15px rgba(34,211,238,.45)' }} /></span>
            <b style={{ color: '#fde68a', fontSize: 18, whiteSpace: 'nowrap' }}>{nt(g.amount)}</b>
            <span style={{ color: '#fcd34d', fontSize: 20, transform: open ? 'rotate(-90deg)' : 'none', transition: 'transform .2s' }}>›</span>
          </button>
          {open && <div style={{ padding: '0 12px 14px' }}>
            <div style={{ height: 1, background: 'linear-gradient(90deg,transparent,rgba(45,212,191,.45),transparent)', marginBottom: 12 }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, marginBottom: 10 }}><b style={{ color: '#5eead4', fontSize: 16 }}>{g.name}支出細項</b><button onClick={() => setSelectedGroup(null)} style={{ border: '1px solid rgba(45,212,191,.4)', borderRadius: 999, padding: '7px 12px', background: 'rgba(13,148,136,.10)', color: '#5eead4', fontWeight: 900 }}>收起⌃</button></div>
            <div style={{ border: '1px solid rgba(34,211,238,.25)', borderRadius: 16, padding: '4px 12px', background: 'rgba(2,6,23,.5)' }}><TxList rows={g.rows || []} /></div>
          </div>}
        </div>; })}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, color: '#2dd4bf', fontSize: 11, marginTop: 12 }}><span style={{ width: 18, height: 18, borderRadius: '50%', border: '1px solid rgba(45,212,191,.5)', display: 'grid', placeItems: 'center' }}>i</span>點擊任一大類可查看該類的所有支出明細</div>
    </Card>'''

          if old not in s:
            raise SystemExit('target category block not found')
          s = s.replace(old, new)
          s = s.replace('多元記帳本 V5.1｜五等分導覽｜大類可展開明細', '多元記帳本 V5.2｜精緻分類卡｜大類展開明細')
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name changeros-bot
          git config user.email chang.eros@gmail.com
          git add pages/financial-os.js
          git diff --cached --quiet || git commit -m "feat(financial): polish category accordion UI"
          git push

# trigger: 2026-07-14 premium category UI